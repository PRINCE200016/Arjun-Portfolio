<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Image</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap');

    body {
      margin: 0;
      padding: 0;
      width: 1200px;
      height: 630px;
      background-color: #030712;
      background-image: 
        radial-gradient(circle at 15% 0%, rgba(56, 189, 248, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 85% 100%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(14, 165, 233, 0.05) 0%, transparent 60%);
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      color: #f8fafc;
    }

    .grid-bg {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      background-position: center center;
      mask-image: radial-gradient(ellipse at center, transparent 30%, black 80%);
      -webkit-mask-image: radial-gradient(ellipse at center, transparent 30%, black 80%);
      z-index: 1;
    }

    /* Emulate the circuit board style from the original but modernized */
    .circuit-accent {
      position: absolute;
      z-index: 2;
      opacity: 0.4;
      background: #030712;
    }
    
    .circuit-1 {
      top: 0;
      left: 0;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle at 0 0, rgba(56, 189, 248, 0.3) 0%, transparent 70%);
    }

    .circuit-2 {
      bottom: 0;
      right: 0;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle at 100% 100%, rgba(56, 189, 248, 0.3) 0%, transparent 70%);
    }

    .content {
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .profile-container {
      position: relative;
      margin-bottom: 28px;
    }

    .profile-img {
      width: 240px;
      height: 240px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 4px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 0 8px rgba(56, 189, 248, 0.1), 0 0 60px rgba(56, 189, 248, 0.3);
      z-index: 2;
      position: relative;
    }

    .glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.4) 0%, transparent 70%);
      z-index: 1;
      border-radius: 50%;
      animation: pulse 4s infinite alternate;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 88px;
      font-weight: 700;
      margin: 0;
      background: linear-gradient(135deg, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.03em;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
      line-height: 1.1;
    }

    .role {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 40px;
      font-weight: 500;
      color: #38bdf8;
      margin-top: 12px;
      padding: 10px 36px;
      background: rgba(56, 189, 248, 0.08);
      border: 1px solid rgba(56, 189, 248, 0.3);
      border-radius: 100px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      letter-spacing: 0.02em;
    }

    .highlights {
      font-size: 26px;
      font-weight: 400;
      color: #94a3b8;
      margin-top: 36px;
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(0,0,0,0.3);
      padding: 12px 32px;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .divider {
      width: 6px;
      height: 6px;
      background-color: #38bdf8;
      border-radius: 50%;
      box-shadow: 0 0 10px #38bdf8;
    }

  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="circuit-1 circuit-accent"></div>
  <div class="circuit-2 circuit-accent"></div>
  
  <div class="content">
    <div class="profile-container">
      <div class="glow"></div>
      <img src="file:///c:/Users/arjun/OneDrive/Desktop/Projects_feb_26/New%20folder/Arjun-Portfolio/public/images/Profile.jpg" class="profile-img" alt="Arjun Rajawat">
    </div>
    
    <h1>Arjun Rajawat</h1>
    <div class="role">Java Full Stack Developer</div>
    
    <div class="highlights">
      <span style="color:#f8fafc;font-weight:500;">Spring Boot</span>
      <div class="divider"></div>
      <span style="color:#f8fafc;font-weight:500;">AI Travel Planner</span>
      <div class="divider"></div>
      <span style="color:#f8fafc;font-weight:500;">Web Developer</span>
    </div>
  </div>
</body>
</html>
